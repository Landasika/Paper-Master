<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Zotero Reader - Fixed</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .controls {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .iframe-container {
            width: 100%;
            height: calc(100vh - 300px);
            min-height: 600px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Zotero Reader 测试（已修复）</h1>

        <div class="controls">
            <div class="input-group">
                <label for="pdfUrl">PDF URL：</label>
                <input
                    type="text"
                    id="pdfUrl"
                    value="http://localhost:3001/uploads/pdf-1774786172364-jhs2r01m2d.pdf"
                    placeholder="输入 PDF 文件 URL"
                >
            </div>

            <div class="input-group">
                <label for="pdfTitle">PDF 标题：</label>
                <input
                    type="text"
                    id="pdfTitle"
                    value="2508.18370v2.pdf"
                    placeholder="输入 PDF 标题"
                >
            </div>

            <button onclick="loadReader()">加载 Reader</button>
            <button onclick="testURLParams()">测试 URL 参数方式</button>

            <div id="status" class="status info">
                准备就绪。修复内容：
                <ul>
                    <li>✅ 加载本地化文件（reader.ftl, zotero.ftl, brand.ftl）</li>
                    <li>✅ 设置 PDF.js worker 路径</li>
                </ul>
            </div>
        </div>

        <div class="iframe-container">
            <iframe id="readerFrame"></iframe>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('readerFrame');
        const statusDiv = document.getElementById('status');

        function showStatus(message, type = 'info') {
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }

        function loadReader() {
            const pdfUrl = document.getElementById('pdfUrl').value;
            const pdfTitle = document.getElementById('pdfTitle').value;

            if (!pdfUrl) {
                showStatus('❌ 请输入 PDF URL', 'error');
                return;
            }

            showStatus('⏳ 正在加载 Reader...', 'info');

            // 方式 1: iframe + postMessage
            iframe.src = '/zotero-reader/reader.html';

            iframe.onload = () => {
                showStatus('✅ Reader 已加载，发送初始化消息...', 'success');

                setTimeout(() => {
                    if (iframe.contentWindow) {
                        iframe.contentWindow.postMessage({
                            type: 'init',
                            data: {
                                url: pdfUrl,
                                title: pdfTitle || 'PDF Document',
                                readOnly: false
                            }
                        }, '*');

                        showStatus('✅ 初始化消息已发送<br>PDF: ' + pdfUrl, 'success');
                    }
                }, 500);
            };

            iframe.onerror = () => {
                showStatus('❌ Reader 加载失败', 'error');
            };
        }

        function testURLParams() {
            const pdfUrl = document.getElementById('pdfUrl').value;
            const pdfTitle = document.getElementById('pdfTitle').value;

            if (!pdfUrl) {
                showStatus('❌ 请输入 PDF URL', 'error');
                return;
            }

            // 方式 2: URL 参数
            const readerUrl = `/zotero-reader/reader.html?url=${encodeURIComponent(pdfUrl)}&title=${encodeURIComponent(pdfTitle || 'PDF')}`;
            iframe.src = readerUrl;

            showStatus('✅ 使用 URL 参数方式加载<br>URL: ' + readerUrl, 'success');
        }

        // 监听来自 iframe 的消息
        window.addEventListener('message', (event) => {
            console.log('[主窗口] 收到消息:', event.data);

            if (event.data.type === 'onSaveAnnotations') {
                showStatus(`💾 保存注释: ${event.data.annotations?.length || 0} 条`, 'info');
            } else if (event.data.type === 'onDeleteAnnotations') {
                showStatus(`🗑️ 删除注释: ${event.data.ids?.length || 0} 条`, 'info');
            } else if (event.data.type === 'onOpenLink') {
                showStatus(`🔗 打开链接: ${event.data.url}`, 'info');
            }
        });
    </script>
</body>
</html>
